name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # Placeholder secrets so env validation & build pass in CI.
      JWT_SECRET: ci-jwt-secret-0123456789abcdef0123456789abcdef
      JWT_REFRESH_SECRET: ci-refresh-secret-0123456789abcdef0123456789
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test -- --ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    services:
      # Postgres replaces the old Mongo service (project migrated to Supabase
      # Postgres / Drizzle). A plain local Postgres is used for tests.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dailywish_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dailywish_test
      JWT_SECRET: ci-jwt-secret-0123456789abcdef0123456789abcdef
      JWT_REFRESH_SECRET: ci-refresh-secret-0123456789abcdef0123456789
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Apply schema & seed
        run: |
          npm run db:apply
          npm run seed
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Run E2E tests
        run: npm run test:e2e
