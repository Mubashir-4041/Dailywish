services:
  db:
    image: postgres:16
    container_name: dailywish-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dailywish}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dailywish}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dailywish-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      # Point at the bundled Postgres by default; override with your Supabase
      # pooler URL to use the hosted database instead.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/dailywish}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dailywish.pk}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-DailyWish <no-reply@dailywish.pk>}

volumes:
  pg-data:
